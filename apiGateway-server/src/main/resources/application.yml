spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

      routes:
        - id: vehiculo-route
          uri: lb://VEHICULO-SERVICE
          predicates:
            - Path=/api/vehiculos/**
          filters:
            - StripPrefix=1

        - id: cotizador-route
          uri: lb://COTIZADOR-SERVICE
          predicates:
            - Path=/api/cotizaciones/**
          filters:
            - StripPrefix=1

        - id: flota-route
          uri: lb://FLOTA-SERVICE
          predicates:
            - Path=/api/flotas/**
          filters:
            - StripPrefix=1

server:
  port: 8085

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    hostname: localhost
    prefer-ip-address: true
    appname: API-GATEWAY
    instance-id: API-GATEWAY:${server.port}